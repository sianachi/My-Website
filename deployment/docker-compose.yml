services:
  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    # S3-compatible storage. Same image for local dev and VPS.
    # Console UI on :9001, S3 API on :9000.
    image: minio/minio:latest
    container_name: portfolio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Browsers PUT directly to MinIO, so the bucket origin must allow CORS.
      # Tighten this on the VPS to your actual SPA origin.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-*}
    # Host ports default to 9000/9001 — override via env if collisions
    # (e.g. Portainer also defaults to 9000). The container ports stay fixed
    # so the minio-init service and any in-network clients still hit :9000.
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    # One-shot: creates the bucket and makes it public-read. Idempotent —
    # safe to re-run on every `up`.
    image: minio/mc:latest
    container_name: portfolio-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${S3_BUCKET:-portfolio}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        mc anonymous set download "local/$$MINIO_BUCKET"
        echo "minio setup complete: bucket=$$MINIO_BUCKET"
    restart: "no"

volumes:
  mongo-data:
  minio-data:
