# Copy this file to backup-secrets.yaml, replace every CHANGE_ME value, then apply
# backup-secrets.yaml separately. Do NOT commit the filled-in copy.
#
# Mongo credentials are intentionally NOT in this secret. The mongo-backup CronJob
# reads MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD from the existing
# `mongo-root` secret (defined in secrets.example.yaml) and assembles the
# connection URI at runtime.
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  namespace: portfolio
type: Opaque
stringData:
  R2_ENDPOINT: https://CHANGE_ME_ACCOUNT_ID.r2.cloudflarestorage.com
  R2_BUCKET: CHANGE_ME_BUCKET_NAME
  R2_ACCESS_KEY_ID: CHANGE_ME_R2_ACCESS_KEY_ID
  R2_SECRET_ACCESS_KEY: CHANGE_ME_R2_SECRET_ACCESS_KEY
