apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: portfolio
data:
  S3_PUBLIC_URL: "https://s3.osinachi.nwagboso.com"
  RP_ID: "osinachi.nwagboso.com"
  RP_NAME: "Osinachi"
  RP_ORIGIN: "https://osinachi.nwagboso.com"

  # Same endpoint for server and browser. Server-to-MinIO traffic now goes
  # through Traefik (TLS adds negligible overhead at this scale) but, more
  # importantly, presigned PUT URLs the server hands the browser are signed
  # against this host — so they must point at a hostname the browser can
  # reach. Using the in-cluster DNS name here would break browser uploads.
  S3_ENDPOINT: "https://s3.osinachi.nwagboso.com"
  S3_BUCKET: "portfolio"
  S3_REGION: "us-east-1"

  PORT: "3001"
