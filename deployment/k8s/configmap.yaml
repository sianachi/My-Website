apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: portfolio
data:
  S3_PUBLIC_URL: "https://s3.osinachi.nwagboso.com"
  RP_ID: "osinachi.nwagboso.com"
  RP_NAME: "Osinachi"
  RP_ORIGIN: "https://osinachi.nwagboso.com"

  # Server-side MinIO endpoint (in-cluster Service DNS). The browser never
  # uses this — it uses S3_PUBLIC_URL above for presigned PUTs and reads.
  S3_ENDPOINT: "http://minio.portfolio.svc.cluster.local:9000"
  S3_BUCKET: "portfolio"
  S3_REGION: "us-east-1"

  PORT: "3001"
