apiVersion: v1
kind: Service
metadata:
  name: portfolio-app
  namespace: portfolio
spec:
  selector:
    app: portfolio-app
  ports:
    - port: 3001
      targetPort: 3001
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
    spec:
      # If the GHCR image is private, create a docker-registry secret named
      # ghcr-pull and uncomment imagePullSecrets below. Public images need no
      # secret.
      # imagePullSecrets:
      #   - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/sianachi/my-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: portfolio-config
            - secretRef:
                name: portfolio-app
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
