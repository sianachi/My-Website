# Copy this file to secrets.yaml, replace every CHANGE_ME value, then apply
# secrets.yaml separately. Do NOT commit the filled-in copy.
#
# The MinIO password appears twice (in minio-root and in portfolio-app's
# S3_SECRET_ACCESS_KEY) because MongoDB and MinIO read their own root
# credentials, while the app reads a pre-assembled connection string and S3
# access pair. Keep them in sync, or create a dedicated MinIO service account
# and put its keys in portfolio-app instead of the root credentials.
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-root
  namespace: portfolio
type: Opaque
stringData:
  username: root
  password: CHANGE_ME_MONGO_ROOT_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: portfolio
type: Opaque
stringData:
  username: minioadmin
  password: CHANGE_ME_MINIO_ROOT_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-app
  namespace: portfolio
type: Opaque
stringData:
  MONGODB_URI: "mongodb://root:CHANGE_ME_MONGO_ROOT_PASSWORD@mongo.portfolio.svc.cluster.local:27017/?authSource=admin"
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: CHANGE_ME_MINIO_ROOT_PASSWORD
